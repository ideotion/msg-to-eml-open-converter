<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>msg2eml</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="card">
    <header class="header">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 6.5A1.5 1.5 0 0 1 4.5 5h15A1.5 1.5 0 0 1 21 6.5v11a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 17.5v-11Z" stroke="currentColor" stroke-width="1.6"/>
          <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>msg2eml</h1>
      </div>
      <p class="tagline">Convert Outlook <code>.msg</code> files to <code>.eml</code>, <code>.ics</code>, or <code>.vcf</code> &mdash; entirely on this computer. Each result is written right next to its source file; nothing is uploaded or downloaded.</p>
    </header>

    <nav id="breadcrumbs" class="breadcrumbs" aria-label="Current folder"></nav>

    <section class="browser">
      <div class="browser-toolbar">
        <button id="up-button" class="button button-ghost" type="button" title="Go up one folder">&uarr; Up</button>
        <button id="scan-button" class="button button-primary" type="button">Scan this folder for .msg files</button>
      </div>
      <ul id="entry-list" class="entry-list"></ul>
      <p id="browser-message" class="browser-message" hidden></p>
    </section>

    <section id="results-section" class="results" hidden>
      <div class="results-header">
        <h2 id="results-title">Found files</h2>
        <div class="results-options">
          <label class="force-toggle">
            <input type="checkbox" id="force-checkbox">
            Overwrite already-converted files
          </label>
        </div>
      </div>
      
      <div id="output-settings" class="output-settings" hidden>
        <div class="output-settings-row">
          <label for="output-path-input" class="output-label">Destination folder:</label>
          <div class="output-path-container">
            <input type="text" id="output-path-input" class="output-path-input" placeholder="Optional: Choose a destination folder" readonly>
            <button id="browse-output-button" class="button button-secondary" type="button">Browse...</button>
            <button id="clear-output-button" class="button button-ghost" type="button" title="Clear destination">&times;</button>
          </div>
        </div>
        <div class="output-settings-row">
          <label class="preserve-toggle">
            <input type="checkbox" id="preserve-structure-checkbox" checked>
            Preserve folder structure
          </label>
          <span class="preserve-hint">(when destination is set, maintain subfolder hierarchy from source)</span>
        </div>
      </div>
      
      <ul id="results-list" class="file-list"></ul>
      <div id="progress-container" class="progress-container" hidden>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <p id="progress-label" class="progress-label"></p>
      </div>
      <div class="actions">
        <button id="convert-button" class="button button-primary" type="button">Convert</button>
        <button id="close-results-button" class="button button-ghost" type="button">Close</button>
      </div>
    </section>
  </main>

  <!-- Output folder browser modal (hidden by default) -->
  <div id="output-browser-modal" class="modal" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Select Destination Folder</h3>
        <button id="close-output-browser" class="button button-ghost" type="button">&times;</button>
      </div>
      <nav id="output-breadcrumbs" class="breadcrumbs" aria-label="Destination folder"></nav>
      <div class="modal-browser">
        <div class="browser-toolbar">
          <button id="output-up-button" class="button button-ghost" type="button" title="Go up one folder">&uarr; Up</button>
        </div>
        <ul id="output-entry-list" class="entry-list"></ul>
      </div>
      <div class="modal-actions">
        <button id="select-output-button" class="button button-primary" type="button" disabled>Select Folder</button>
        <button id="cancel-output-button" class="button button-ghost" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
